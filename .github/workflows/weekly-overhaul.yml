name: Weekly Autonomous Overhaul

on:
  schedule:
    # Run at 02:00 every Monday
    - cron: '0 2 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  radar-and-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout Infra
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: 📡 Run Radar (Fetch Trending)
        run: PYTHONPATH=. uv run python src/radar/fetch_trending.py

      - name: 🔍 Scan Open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. uv run python src/agent/pr_monitor.py

      - name: 🤖 Auto-Merge Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. uv run python src/agent/auto_merger.py

      - name: 🛡️ Scan Security Alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. uv run python src/agent/security_fixer.py

      - name: 🧠 Run Analyst & Planner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: PYTHONPATH=. uv run python src/agent/orchestrator.py

      - name: 🤖 Execute (Dry Run / Proposal)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. uv run python src/agent/executor.py

      - name: 📢 Send Weekly Notification
        run: PYTHONPATH=. uv run python src/agent/weekly_summary.py

      - name: Commit and Create PR for Findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Infra Bot"
          git config --global user.email "bot@infra.local"
          
          BRANCH_NAME="maintenance/weekly-overhaul-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          
          FILES_ADDED=false
          for f in TRENDING.md trending_tech.json tasks_queue.json PR_REPORT.md SECURITY_REPORT.json MERGED_REPORT.json; do
            if [ -f "$f" ]; then
              git add "$f"
              FILES_ADDED=true
            fi
          done
          
          if [ "$FILES_ADDED" = true ] && git commit -m "chore: update maintenance findings [skip ci]"; then
            git push origin "$BRANCH_NAME"
            gh pr create --title "Weekly Maintenance Findings" --body "Automated update of maintenance findings and status reports." --head "$BRANCH_NAME" --base main
          else
            echo "No changes to commit"
          fi
