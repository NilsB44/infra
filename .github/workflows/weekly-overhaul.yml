name: Weekly Autonomous Overhaul

on:
  schedule:
    # Run at 02:00 every Monday
    - cron: '0 2 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  radar-and-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout Infra
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: 📡 Run Radar (Fetch Trending)
        run: PYTHONPATH=. uv run python src/radar/fetch_trending.py

      - name: 🔍 Scan Open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. uv run python src/agent/pr_monitor.py

      - name: 🤖 Auto-Merge Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. uv run python src/agent/auto_merger.py

      - name: 🧠 Run Analyst & Planner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: PYTHONPATH=. uv run python src/agent/orchestrator.py

      - name: 🤖 Execute (Dry Run / Proposal)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. uv run python src/agent/executor.py

      - name: 📢 Send Weekly Notification
        run: PYTHONPATH=. uv run python src/agent/weekly_summary.py

      - name: Commit Findings
        run: |
          git config --global user.name "Infra Bot"
          git config --global user.email "bot@infra.local"
          # Only add files that actually exist to avoid fatal errors
          for f in TRENDING.md trending_tech.json tasks_queue.json PR_REPORT.md; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done
          git commit -m "chore: update radar and pr findings [skip ci]" || echo "No changes to commit"
          git push
