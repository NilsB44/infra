name: AI Code Reviewer

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: |
          if [ -f "pyproject.toml" ]; then
            uv sync
          fi

      - name: Run Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "src/agent/reviewer.py" ]; then
            uv run python src/agent/reviewer.py
          else
            echo "Reviewer script not found in caller repo. Fetching from infra..."
            curl -fsSL https://raw.githubusercontent.com/NilsB44/infra/main/src/agent/reviewer.py -o reviewer.py
            # Ensure google-genai is available even if not in pyproject.toml
            uv run --with google-genai python reviewer.py
          fi
