name: AI Code Reviewer

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Run Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to find the reviewer script in the current repo (if it's infra)
          # or we might need to fetch it from the infra repo.
          # Since this is a reusable workflow, 'src/agent/reviewer.py' refers to the caller repo.
          # We should probably use a separate action or fetch the script.
          
          if [ -f "src/agent/reviewer.py" ]; then
            uv run python src/agent/reviewer.py
          else
            echo "Reviewer script not found in caller repo. Fetching from infra..."
            curl -fsSL https://raw.githubusercontent.com/NilsB44/infra/main/src/agent/reviewer.py -o reviewer.py
            uv run python reviewer.py
          fi
